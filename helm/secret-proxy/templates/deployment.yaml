apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secret-proxy.fullname" . }}
  labels:
    {{- include "secret-proxy.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "secret-proxy.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "secret-proxy.labels" . | nindent 8 }}
    spec:
      containers:
        - name: secret-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: {{ include "secret-proxy.fullname" . }}-config
