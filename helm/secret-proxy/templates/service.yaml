apiVersion: v1
kind: Service
metadata:
  name: {{ include "secret-proxy.fullname" . }}
  labels:
    {{- include "secret-proxy.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  selector:
    {{- include "secret-proxy.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "secret-proxy.fullname" . }}-config
data:
  config.yaml: |
    {{- .Values.configYaml | nindent 4 }}
