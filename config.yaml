# secret-proxy configuration

scanners:
  gitleaks: true          # gitleaks binary (700+ named rules)
  detect_secrets: true    # detect-secrets Python lib
  keyword_regex: true     # password=xxx, token=xxx etc.
  custom_patterns: true   # patterns defined below
  llm: false              # LLM semantic scan (set true + configure llm: section)

# LLM scanner config (used when scanners.llm: true)
# Prompt is strict and hardcoded in scanner.py — thinking/reasoning disabled automatically
llm:
  base_url: http://10.0.30.18:8081/v1
  api_key: dummy
  model: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
  timeout: 10

# Request size limits
limits:
  max_body_size_kb: 500   # requests larger than this are passed through unmasked

# Custom patterns (regex, applied on top of built-in scanners)
patterns:
  - name: internal_domain
    regex: '[a-z0-9-]+\.(internal|local|corp|lan|intranet)'
    placeholder: "[INTERNAL_DOMAIN]"

  - name: internal_ip
    regex: '(?:10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3})'
    placeholder: "[INTERNAL_IP]"

  - name: connection_string
    regex: '(?:Server|Host|Data Source)=[a-zA-Z0-9.-]+(?:;|$)'
    placeholder: "[CONN_HOST]"

# Allowlist — skip masking for trusted values
allowlist:
  # Exact strings — never mask these values
  values: []
  # Regex patterns — skip masking if secret matches
  patterns: []
  # Example:
  # values:
  #   - "localhost"
  #   - "127.0.0.1"
  # patterns:
  #   - "^test_.*"

# Scan profiles — select via X-Scan-Profile header or default_profile
default_profile: standard

profiles:
  strict:
    description: "Block all secrets, no exceptions"
    scanners:
      gitleaks: true
      detect_secrets: true
      keyword_regex: true
      custom_patterns: true
      llm: false
    policy:
      default_action: block    # block | warn | sanitize
      max_secrets: 0           # 0 = any secret → block
      rules: []

  standard:
    description: "Sanitize secrets, warn on high count"
    scanners:
      gitleaks: true
      detect_secrets: true
      keyword_regex: true
      custom_patterns: true
      llm: false
    policy:
      default_action: sanitize
      max_secrets: 10          # more than 10 → block
      rules:
        - layer: gitleaks
          action: sanitize
        - layer: keyword_regex
          action: sanitize
        - layer: custom
          action: sanitize

  dev:
    description: "Warn only, no blocking"
    scanners:
      gitleaks: true
      detect_secrets: false
      keyword_regex: true
      custom_patterns: true
      llm: false
    policy:
      default_action: warn
      max_secrets: null        # no limit
      rules: []
